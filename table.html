<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table{
            border: 2px solid black;
            border-collapse: collapse ;
        }
        td,th{
            border: 2px solid blueviolet;
            padding: 5px;
            text-align: center;
        }

    </style>
</head>
<body>
    <table>
        <thead>
            <th>Ocean</th>
            <th>Avg Depth</th>
            <th>Maximum Depth</th>
        </thead>
        <tbody>
            <tr>
                <td>Pacific Oceans</td>
                <td>4,280 m </td>
                <td>10,911 m</td>
            </tr>
            <tr>
                <td>Atlantic Ocean</td>
                <td>3,646 m </td>
                <td>8,486</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
